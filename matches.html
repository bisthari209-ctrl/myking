<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Center | Mero Ludo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg-dark: #0f172a; --card-bg: #1e293b; --gold: #fbbf24; 
            --text-main: #f8fafc; --text-dim: #94a3b8; --border-gold: rgba(251, 191, 36, 0.3);
            --color-join: #22c55e; --color-mine: #3b82f6; --color-waiting: #f59e0b; --color-result: #ec4899; 
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-dark); color: var(--text-main); padding-bottom: 90px; }
        
        #toast { 
            visibility: hidden; min-width: 250px; background-color: #1e293b; color: var(--gold); 
            text-align: center; border-radius: 15px; padding: 20px; position: fixed; 
            z-index: 5000; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.7); 
            border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(0, 0, 0, 0.6); 
            font-weight: bold; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .tabs { display: flex; background: #111827; position: sticky; top: 0; z-index: 1000; overflow-x: auto; padding: 5px; gap: 5px; }
        .tab { flex: 1; padding: 14px 10px; text-align: center; cursor: pointer; font-weight: 800; font-size: 0.7rem; white-space: nowrap; text-transform: uppercase; transition: 0.3s; border-radius: 10px; color: white; opacity: 0.5; border: 1px solid rgba(255,255,255,0.1); }
        .tab.active { opacity: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transform: translateY(-2px); border: 2px solid white; }
        #tab-open { background: var(--color-join); }
        #tab-mine { background: var(--color-mine); }
        #tab-waiting { background: var(--color-waiting); }
        #tab-result { background: var(--color-result); }

        .container { padding: 15px; }
        .match-card { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 20px; border: 1px solid var(--border-gold); position: relative; }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .game-name { font-weight: 800; color: var(--gold); font-size: 1.1rem; }
        .entry-fee { background: rgba(251, 191, 36, 0.1); color: var(--gold); padding: 4px 12px; border-radius: 99px; border: 1px solid var(--gold); font-weight: 700; font-size: 0.8rem; }
        
        .btn-group { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; color: white; font-size: 0.75rem; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .join-btn { background: #22c55e; }
        .win-btn { background: #27ae60; }
        .loss-btn { background: #e74c3c; }
        .chat-btn { background: #6366f1; }
        .room-btn { background: #f59e0b; }

        /* Room code styles updated */
        .room-box { background: rgba(251, 191, 36, 0.1); border: 1px dashed var(--gold); padding: 12px; border-radius: 10px; margin-top: 10px; text-align: center; color: var(--gold); font-weight: bold; cursor: pointer; transition: 0.2s; position: relative; }
        .room-box:active { background: rgba(251, 191, 36, 0.3); transform: scale(0.98); }
        .room-box i { margin-right: 5px; }

        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .badge-win { background: #22c55e; color: white; }
        .badge-loss { background: #ef4444; color: white; }
        .badge-pending { background: #64748b; color: white; }

        #chatModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; }
        .chat-container { width:90%; max-width:400px; height:80vh; background:var(--card-bg); margin:10vh auto; border-radius:20px; display:flex; flex-direction:column; overflow:hidden; }
        .chat-header { padding:15px; background:#111827; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-gold); }
        #chatMessages { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; }
        .msg { padding:10px 15px; border-radius:15px; max-width:80%; font-size:0.9rem; }
        .msg.sent { align-self:flex-end; background:var(--color-mine); color:white; }
        .msg.received { align-self:flex-start; background:#334155; color:white; }
        .chat-input-area { padding:15px; background:#111827; display:flex; gap:10px; }
        .chat-input-area input { flex:1; background:#0f172a; border:1px solid #334155; padding:10px; border-radius:10px; color:white; }

        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(30, 41, 59, 0.95); display: flex; justify-content: space-around; padding: 12px 0; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.7rem; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 1.2rem; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div id="toast">सूचना...</div>

    <div class="tabs">
        <div class="tab active" id="tab-open" onclick="switchTab('open')">Join</div>
        <div class="tab" id="tab-mine" onclick="switchTab('mine')">Mine</div>
        <div class="tab" id="tab-waiting" onclick="switchTab('waiting')">Waiting</div>
        <div class="tab" id="tab-result" onclick="switchTab('result')">Result</div>
    </div>

    <div class="container">
        <div id="matchList"></div>
    </div>

    <div id="chatModal">
        <div class="chat-container">
            <div class="chat-header">
                <span id="chatTitle">Chat</span>
                <i class="fas fa-times" onclick="closeChat()"></i>
            </div>
            <div id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button onclick="sendMessage()" style="background:var(--gold); border:none; padding:10px 15px; border-radius:10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i>Home</a>
        <a href="matches.html" class="nav-item active"><i class="fas fa-gamepad"></i>Matches</a>
        <a href="notice.html" class="nav-item"><i class="fas fa-bullhorn"></i>Notice</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i>Profile</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, getDoc, getDocs, addDoc, serverTimestamp, orderBy, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALYYgyAZ_mLWeXHvYvL9LXsDaTHCbDK_g",
            authDomain: "harishbist-3a263.firebaseapp.com",
            projectId: "harishbist-3a263",
            storageBucket: "harishbist-3a263.appspot.com",
            messagingSenderId: "816353842957",
            appId: "1:816353842957:web:5b853c5bed6450fc544244"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = {};
        let currentTab = 'open';
        let activeChatId = null;
        let chatUnsubscribe = null;
        const IMGBB_API_KEY = "6f75c5b567c5450a0cf9f545372a89aa";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if(snap.exists()) userData = snap.data();
                });
                loadMatches();
            } else {
                window.location.href = "login.html";
            }
        });

        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            loadMatches();
        };

        function loadMatches() {
            const list = document.getElementById('matchList');
            list.innerHTML = `<p style="text-align:center; color:gray;">लोड हुँदैछ...</p>`;
            const matchesRef = collection(db, "matches");
            let q;

            if (currentTab === 'open') {
                q = query(matchesRef, where("status", "==", "waiting"));
            } else if (currentTab === 'mine') {
                q = query(matchesRef, where("createdBy", "==", currentUser.uid), where("status", "==", "waiting"));
            } else if (currentTab === 'waiting') {
                q = query(matchesRef, where("allParticipants", "array-contains", currentUser.uid), where("status", "in", ["joined", "pending_review"]));
            } else {
                q = query(matchesRef, where("allParticipants", "array-contains", currentUser.uid), where("status", "in", ["result", "disputed", "pending_review"]));
            }

            onSnapshot(q, (snapshot) => {
                list.innerHTML = "";
                let count = 0;
                snapshot.forEach((matchDoc) => {
                    const match = matchDoc.data();
                    const matchId = matchDoc.id;
                    const userSubmitted = match[`result_${currentUser.uid}`];

                    if (currentTab === 'waiting' && userSubmitted) return;
                    if (currentTab === 'result' && !userSubmitted && match.status !== 'result') return;
                    if (currentTab === 'open' && match.createdBy === currentUser.uid) return;

                    count++;
                    const winPrize = (match.entryFee * 2) * 0.85;
                    const card = document.createElement('div');
                    card.className = "match-card";
                    
                    let actionButtons = "";
                    // Updated roomDisplay with onclick copy
                    let roomDisplay = match.roomCode ? `<div class="room-box" onclick="copyRoomCode('${match.roomCode}')"><i class="fas fa-copy"></i> ROOM CODE: ${match.roomCode}</div>` : "";
                    let statusInfo = "";

                    if (currentTab === 'open') {
                        actionButtons = `<button class="action-btn join-btn" onclick="joinMatch('${matchId}', ${match.entryFee})">JOIN NOW</button>`;
                    } else if (currentTab === 'mine') {
                        actionButtons = `<button class="action-btn" style="background:#475569;" disabled>WAITING FOR OPPONENT</button>`;
                    } else if (currentTab === 'waiting') {
                        actionButtons += `<button class="action-btn chat-btn" onclick="openChat('${matchId}')"><i class="fas fa-comments"></i></button>`;
                        if (match.createdBy === currentUser.uid && !match.roomCode) {
                            actionButtons += `<button class="action-btn room-btn" onclick="setRoomCode('${matchId}')">SET ROOM</button>`;
                        }
                        actionButtons += `
                            <button class="action-btn win-btn" onclick="handleResult('${matchId}', 'win')">WIN</button>
                            <button class="action-btn loss-btn" onclick="handleResult('${matchId}', 'loss')">LOSS</button>
                        `;
                    } else if (currentTab === 'result') {
                        if (match.status === 'disputed') {
                            statusInfo = `<span class="status-badge badge-pending" style="background:#ef4444;">DISPUTED</span>`;
                        } else if (match.status === 'result') {
                            const isWinner = match.finalWinner === currentUser.uid;
                            statusInfo = isWinner ? `<span class="status-badge badge-win">YOU WON</span>` : `<span class="status-badge badge-loss">YOU LOST</span>`;
                        } else {
                            statusInfo = `<span class="status-badge badge-pending">PENDING REVIEW</span>`;
                        }
                    }

                    card.innerHTML = `
                        <div class="match-header">
                            <span class="game-name">${match.game || 'Ludo'}</span>
                            <span class="entry-fee">रू ${match.entryFee}</span>
                        </div>
                        <div class="match-body">
                            <b>PRIZE:</b> रू ${winPrize.toFixed(0)} | <b>VS:</b> ${match.createdBy === currentUser.uid ? (match.joinedName || '...') : 'Opponent'}
                            <div style="margin-top:10px;">${statusInfo}</div>
                        </div>
                        ${roomDisplay}
                        <div class="btn-group">${actionButtons}</div>
                    `;
                    list.appendChild(card);
                });
                if(count === 0) list.innerHTML = `<p style="text-align:center; color:gray; margin-top:30px;">डाटा छैन।</p>`;
            });
        }

        // Copy Room Code Function
        window.copyRoomCode = (code) => {
            navigator.clipboard.writeText(code).then(() => {
                showToast("रूम कोड कपी भयो: " + code);
            }).catch(err => {
                // Fallback for older devices
                const el = document.createElement('textarea');
                el.value = code;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("रूम कोड कपी भयो: " + code);
            });
        };

        async function checkAutoApprove(matchId) {
            const matchRef = doc(db, "matches", matchId);
            const snap = await getDoc(matchRef);
            const match = snap.data();
            
            const p1 = match.createdBy;
            const p2 = match.joinedBy;
            const res1 = match[`result_${p1}`];
            const res2 = match[`result_${p2}`];

            if (res1 && res2) {
                if (res1 !== res2) {
                    const winnerId = (res1 === 'win') ? p1 : p2;
                    const winAmt = (match.entryFee * 2) * 0.85;
                    
                    await updateDoc(matchRef, { 
                        status: "result", 
                        finalWinner: winnerId, 
                        closedAt: serverTimestamp() 
                    });
                    
                    await updateDoc(doc(db, "users", winnerId), { 
                        balance: increment(winAmt) 
                    });
                    showToast("नतिजा घोषणा भयो!");
                } else {
                    await updateDoc(matchRef, { 
                        status: "disputed",
                        disputeReason: "Conflict: Both claimed " + res1
                    });
                }
            }
        }

        window.joinMatch = async (matchId, fee) => {
            const qPending = query(
                collection(db, "matches"), 
                where("allParticipants", "array-contains", currentUser.uid),
                where("status", "in", ["joined", "pending_review"])
            );
            
            const activeCheck = await getDocs(qPending);
            let mustSubmitFirst = false;
            activeCheck.forEach(docSnap => {
                if (!docSnap.data()[`result_${currentUser.uid}`]) mustSubmitFirst = true;
            });

            if (mustSubmitFirst) {
                return Swal.fire("पर्खनुहोस्!", "तपाईंको एउटा गेमको नतिजा बुझाउन बाँकी छ।", "error");
            }

            if (userData.balance < fee) return showToast("ब्यालेन्स पुगेन!");

            const res = await Swal.fire({ title: 'Join?', text: "रू " + fee + " काटिनेछ।", showCancelButton: true });
            if (res.isConfirmed) {
                const matchRef = doc(db, "matches", matchId);
                const matchSnap = await getDoc(matchRef);
                const matchData = matchSnap.data();

                if(matchData.status !== "waiting") return showToast("यो गेम अरुले जोइन गरिसक्यो!");

                await updateDoc(matchRef, { 
                    joinedBy: currentUser.uid, 
                    joinedName: userData.name, 
                    status: "joined",
                    allParticipants: [currentUser.uid, matchData.createdBy]
                });
                await updateDoc(doc(db, "users", currentUser.uid), { balance: increment(-fee) });
                showToast("जोइन सफल!");
                switchTab('waiting');
            }
        };

        window.handleResult = async (matchId, type) => {
            const { value: file } = await Swal.fire({
                title: 'Screenshot अपलोड गर्नुहोस',
                input: 'file',
                inputAttributes: { 'accept': 'image/*' },
                showCancelButton: true
            });

            if (file) {
                showToast("सर्भरमा अपलोड हुँदैछ...");
                const formData = new FormData();
                formData.append("image", file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const result = await response.json();

                    if (result.success) {
                        const imageUrl = result.data.url;
                        await updateDoc(doc(db, "matches", matchId), {
                            status: "pending_review",
                            [`proof_${currentUser.uid}`]: imageUrl,
                            [`result_${currentUser.uid}`]: type
                        });
                        
                        await checkAutoApprove(matchId);
                        showToast("नतिजा बुझाइयो!");
                        switchTab('result');
                    } else {
                        throw new Error("ImgBB Upload Failed");
                    }
                } catch (error) {
                    console.error(error);
                    showToast("अपलोड फेल भयो!");
                }
            }
        };

        window.setRoomCode = async (matchId) => {
            const { value: code } = await Swal.fire({ title: 'Room Code', input: 'text', showCancelButton: true });
            if (code) {
                await updateDoc(doc(db, "matches", matchId), { roomCode: code });
                showToast("कोड सेट भयो!");
            }
        };

        window.openChat = (matchId) => {
            activeChatId = matchId;
            document.getElementById('chatModal').style.display = 'block';
            const msgContainer = document.getElementById('chatMessages');
            const q = query(collection(db, "matches", matchId, "messages"), orderBy("createdAt", "asc"));
            chatUnsubscribe = onSnapshot(q, (snap) => {
                msgContainer.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.senderId === currentUser.uid ? 'sent' : 'received'}`;
                    div.innerText = m.text;
                    msgContainer.appendChild(div);
                });
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        };

        window.closeChat = () => {
            document.getElementById('chatModal').style.display = 'none';
            if(chatUnsubscribe) chatUnsubscribe();
        };

        window.sendMessage = async () => {
            const input = document.getElementById('chatInput');
            if(!input.value.trim() || !activeChatId) return;
            await addDoc(collection(db, "matches", activeChatId, "messages"), {
                text: input.value,
                senderId: currentUser.uid,
                createdAt: serverTimestamp()
            });
            input.value = "";
        };

        window.showToast = (msg) => {
            const t = document.getElementById("toast");
            t.innerText = msg; t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        };
    </script>
</body>
</html>
