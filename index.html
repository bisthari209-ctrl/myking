<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | Mero Ludo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --primary: #1a252f; 
            --gold: #f1c40f; 
            --success: #27ae60; 
            --input-bg: rgba(255, 255, 255, 0.05); 
            --text: #ffffff;
        }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--primary); overflow: hidden; color: var(--text); }
        #pageLoader { position: fixed; inset: 0; background: var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .auth-box { 
            width: 85%; max-width: 350px; background: var(--primary); padding: 30px; border-radius: 20px; 
            text-align: center; display: none; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .logo { font-size: 3rem; color: var(--gold); margin-bottom: 10px; }
        h2 { margin: 0 0 20px 0; color: var(--text); font-size: 1.4rem; font-weight: 600; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 14px; color: var(--gold); }
        .input-group input { 
            width: 100%; padding: 12px 10px 12px 45px; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; background: var(--input-bg); color: #fff; outline: none; box-sizing: border-box;
        }
        .btn-auth { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--gold); 
            color: var(--primary); font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-auth:disabled { background: #555; cursor: not-allowed; }
        .switch-text { margin-top: 20px; font-size: 0.9rem; color: rgba(255,255,255,0.6); }
        .switch-text b { color: var(--gold); cursor: pointer; }
        .bonus-tag { background: var(--success); color: white; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; margin-bottom: 15px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pageLoader">
        <i class="fas fa-gamepad fa-3x fa-spin" style="color: var(--gold);"></i>
        <p style="margin-top: 15px; color: #fff;">चेक गर्दैछ...</p>
    </div>

    <div class="container">
        <div class="auth-box" id="registerForm">
            <div class="logo"><i class="fas fa-gamepad"></i></div>
            <div class="bonus-tag">बोनस रू ५ प्राप्त गर्नुहोस्! 🎁</div>
            <h2>नयाँ खाता खोल्नुहोस्</h2>
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regName" placeholder="पूरा नाम"></div>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="इमेल एड्रेस"></div>
            <div class="input-group"><i class="fas fa-key"></i><input type="password" id="regPass" placeholder="पासवर्ड (Min. 6 characters)"></div>
            <div class="input-group"><i class="fas fa-user-friends"></i><input type="text" id="regRefer" placeholder="अनिवार्य रेफरल कोड"></div>
            <button class="btn-auth" id="regBtn" onclick="handleRegister()">REGISTER & GET रू 5</button>
            <p class="switch-text">खाता छ? <b onclick="toggleForm('login')">Login गर्नुहोस्</b></p>
        </div>

        <div class="auth-box" id="loginForm">
            <div class="logo"><i class="fas fa-user-circle"></i></div>
            <h2>लगइन गर्नुहोस्</h2>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="इमेल एड्रेस"></div>
            <div class="input-group"><i class="fas fa-key"></i><input type="password" id="loginPass" placeholder="पासवर्ड"></div>
            <button class="btn-auth" id="loginBtn" onclick="handleLogin()">LOGIN</button>
            <p class="switch-text">खाता छैन? <b onclick="toggleForm('register')">दर्ता गर्नुहोस्</b></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, increment, collection, query, where, getDocs, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALYYgyAZ_mLWeXHvYvL9LXsDaTHCbDK_g",
            authDomain: "harishbist-3a263.firebaseapp.com",
            projectId: "harishbist-3a263",
            storageBucket: "harishbist-3a263.firebasestorage.app",
            messagingSenderId: "816353842957",
            appId: "1:816353842957:web:5b853c5bed6450fc544244"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // युजर लग-इन छ कि छैन एक पटक मात्र चेक गर्ने (Double redirect रोक्न)
        const unsubscribe = onAuthStateChanged(auth, (user) => {
            unsubscribe(); // चेक गरेपछि यो श्रोता बन्द गर्ने
            if (user) {
                window.location.replace("dashboard.html");
            } else {
                document.getElementById('pageLoader').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
            }
        });

        window.toggleForm = (type) => {
            document.getElementById('registerForm').style.display = (type === 'login') ? 'none' : 'block';
            document.getElementById('loginForm').style.display = (type === 'login') ? 'block' : 'none';
        };

        const toast = (msg, icon = 'info') => {
            Swal.fire({ 
                text: msg, icon: icon, confirmButtonColor: '#f1c40f', 
                background: '#1a252f', color: '#fff', timer: 3000 
            });
        };

        window.handleRegister = async () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const referCode = document.getElementById('regRefer').value.trim();
            const btn = document.getElementById('regBtn');

            if(!name || !email || !pass || !referCode) return toast("सबै विवरण भर्नुहोस्!", "warning");
            if(pass.length < 6) return toast("पासवर्ड कम्तिमा ६ अक्षरको हुनुपर्छ!", "error");

            btn.disabled = true;
            btn.innerText = "प्रक्रिया हुँदैछ...";

            try {
                // १. रेफरल कोड चेक गर्ने
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("referralCode", "==", referCode)); 
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    btn.disabled = false;
                    btn.innerText = "REGISTER & GET रू 5";
                    return toast("गलत रेफरल कोड!", "error");
                }

                const referrerDoc = querySnapshot.docs[0];
                const referrerUid = referrerDoc.id;

                // २. अथेन्टिकेसन एकाउन्ट बनाउने
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const newUser = userCredential.user;

                // ३. नयाँ युजर कोड
                const uidTail = newUser.uid.slice(-4).toUpperCase();
                const myNewCode = "LUDO" + uidTail + Math.floor(10 + Math.random() * 89);

                // ४. व्याच अपडेट (बोनस एड गर्न)
                const batch = writeBatch(db);
                batch.set(doc(db, "users", newUser.uid), {
                    name: name, email: email, balance: 5,
                    referralCode: myNewCode, referBy: referCode,
                    referCount: 0, uid: newUser.uid, joinedAt: serverTimestamp()
                });
                batch.update(doc(db, "users", referrerUid), {
                    balance: increment(7), referCount: increment(1)
                });

                await batch.commit();

                // सफलता म्यासेज पछि मात्र रिडाइरेक्ट
                toast("दर्ता सफल! बोनस प्राप्त भयो।", "success");
                setTimeout(() => window.location.replace("dashboard.html"), 1500);

            } catch (error) {
                btn.disabled = false;
                btn.innerText = "REGISTER & GET रू 5";
                let errorMsg = "दर्ता हुन सकेन!";
                if(error.code === 'auth/email-already-in-use') errorMsg = "यो इमेल पहिल्यै प्रयोगमा छ!";
                toast(errorMsg, "error");
            }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const btn = document.getElementById('loginBtn');

            if(!email || !pass) return toast("इमेल र पासवर्ड हाल्नुहोस्!", "warning");

            btn.disabled = true;
            btn.innerText = "लगइन हुँदैछ...";

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.replace("dashboard.html");
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "LOGIN";
                toast("इमेल वा पासवर्ड गलत छ!", "error");
            }
        };
    </script>
</body>
</html>
